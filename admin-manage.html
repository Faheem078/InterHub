<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Tasks – InternHub Admin</title>
<link rel="stylesheet" href="css/components.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--red:#DC2626;--red-dark:#991B1B;--red-light:#FEE2E2;--blue:#1D4ED8;--blue-dark:#1E3A8A;--blue-light:#DBEAFE;--white:#fff;--dark:#0F172A;--gray:#64748B;--border:#E2E8F0;--off-white:#F8FAFC;--sidebar:240px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--dark);min-height:100vh;display:flex}
  h1,h2,h3,h4{font-family:'Syne',sans-serif}
  .sidebar{width:var(--sidebar);background:var(--dark);min-height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:50}
  .sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo-icon{width:34px;height:34px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:white;font-size:16px;flex-shrink:0}
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:white}
  .logo-text span{color:#FCA5A5}
  .admin-badge{background:var(--red);color:white;font-size:9px;font-weight:800;padding:2px 7px;border-radius:100px;letter-spacing:.5px;text-transform:uppercase;margin-left:6px}
  .sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
  .nav-section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);padding:12px 8px 6px;font-weight:700}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;color:rgba(255,255,255,.6);font-size:14px;font-weight:500;transition:all .2s}
  .nav-item:hover{background:rgba(255,255,255,.08);color:white}
  .nav-item.active{background:var(--red);color:white}
  .nav-icon{font-size:17px;width:20px;text-align:center;flex-shrink:0}
  .nav-badge{margin-left:auto;background:var(--red);color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px}
  .nav-item.active .nav-badge{background:rgba(255,255,255,.3)}
  .sidebar-bottom{padding:16px 12px;border-top:1px solid rgba(255,255,255,.08)}
  .user-profile{display:flex;align-items:center;gap:10px;padding:10px 12px}
  .user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--blue));display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:13px;flex-shrink:0}
  .user-name{font-size:13px;font-weight:600;color:white}
  .user-role{font-size:11px;color:rgba(255,255,255,.4)}
  .main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column}
  .topbar{background:white;border-bottom:2px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
  .topbar h1{font-size:20px;font-weight:800}
  .admin-tag{background:var(--red-light);color:var(--red-dark);font-size:12px;font-weight:700;padding:5px 12px;border-radius:8px;border:1px solid #FCA5A5}
  .content{padding:32px}
  .toolbar{background:white;border-radius:14px;border:2px solid var(--border);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .filter-tabs{display:flex;gap:6px}
  .filter-tab{padding:7px 16px;border-radius:8px;border:2px solid var(--border);background:var(--off-white);font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
  .filter-tab:hover{border-color:var(--blue);color:var(--blue)}
  .filter-tab.active{background:var(--red);color:white;border-color:var(--red)}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--off-white);border:2px solid var(--border);border-radius:10px;padding:8px 14px;flex:1;max-width:300px}
  .search-box input{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%;color:var(--dark)}
  .search-box input::placeholder{color:#CBD5E1}
  .sort-select{padding:8px 14px;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray);background:var(--off-white);outline:none;cursor:pointer}
  .results-info{margin-left:auto;font-size:13px;color:var(--gray)}
  .card{background:white;border-radius:16px;border:2px solid var(--border);overflow:hidden}
  .big-table{width:100%;border-collapse:collapse}
  .big-table th{padding:13px 20px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--gray);font-weight:700;background:var(--off-white);border-bottom:1px solid var(--border)}
  .big-table td{padding:16px 20px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
  .big-table tr:last-child td{border-bottom:none}
  .big-table tr:hover td{background:var(--off-white)}
  .intern-cell{display:flex;align-items:center;gap:10px}
  .intern-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:12px;flex-shrink:0}
  .intern-name{font-weight:600;font-size:13px;color:var(--dark)}
  .intern-email{font-size:11px;color:var(--gray)}
  .task-name-cell{font-weight:600;color:var(--dark);margin-bottom:2px;font-size:13px}
  .task-cat{font-size:11px;color:var(--gray)}
  .badge{display:inline-flex;align-items:center;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:700}
  .badge-pending{background:#FEF3C7;color:#92400E}
  .badge-approved{background:#D1FAE5;color:#065F46}
  .badge-rejected{background:var(--red-light);color:var(--red-dark)}
  .action-btns{display:flex;gap:6px}
  .action-btn{padding:6px 12px;border-radius:7px;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
  .btn-approve{background:#D1FAE5;color:#065F46}
  .btn-approve:hover{background:#10B981;color:white}
  .btn-reject{background:var(--red-light);color:var(--red-dark)}
  .btn-reject:hover{background:var(--red);color:white}
  .btn-view{background:var(--blue-light);color:var(--blue)}
  .btn-view:hover{background:var(--blue);color:white}
  .btn-delete{background:var(--off-white);color:var(--gray);border:1px solid var(--border)}
  .btn-delete:hover{background:var(--red-light);color:var(--red-dark);border-color:var(--red)}
  .pagination{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-top:1px solid var(--border)}
  .page-info{font-size:13px;color:var(--gray)}
  .page-btns{display:flex;gap:6px}
  .page-btn{width:32px;height:32px;border-radius:8px;border:2px solid var(--border);background:white;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center}
  .page-btn:hover{border-color:var(--blue);color:var(--blue)}
  .page-btn.active{background:var(--red);color:white;border-color:var(--red)}
  .toast{position:fixed;top:24px;right:24px;background:var(--dark);color:white;padding:14px 22px;border-radius:12px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:10px;z-index:999;transform:translateX(120%);transition:transform .4s cubic-bezier(.16,1,.3,1);box-shadow:0 12px 40px rgba(0,0,0,.3)}
  .toast.show{transform:translateX(0)}
  .toast.success{border-left:4px solid #10B981}
  .toast.error{border-left:4px solid var(--red)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .modal-overlay.show{display:flex}
  .modal{background:white;border-radius:20px;padding:32px;max-width:500px;width:90%}
  .modal h3{font-size:18px;font-weight:800;margin-bottom:6px}
  .modal p{font-size:13px;color:var(--gray);margin-bottom:20px}
  .modal-detail{background:var(--off-white);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;line-height:1.6}
  .modal-detail strong{color:var(--dark);font-weight:600}
  .modal textarea{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:vertical;min-height:90px;transition:border .2s;background:var(--off-white)}
  .modal textarea:focus{border-color:var(--blue);background:white}
  .modal-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:16px}
  .modal-btn-cancel{padding:9px 20px;border:2px solid var(--border);border-radius:9px;background:white;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;font-family:'DM Sans',sans-serif}
  .modal-btn-approve{padding:9px 20px;background:#10B981;color:white;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif}
  .modal-btn-approve:hover{background:#059669}
  .modal-btn-reject{padding:9px 20px;background:var(--red);color:white;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif}
  @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
</style>
</head>
<body>

<div class="toast" id="toast"><span id="toastIcon">✅</span><span id="toastMsg">—</span></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle">Review Submission</h3>
    <p id="modalSub">—</p>
    <div class="modal-detail" id="modalDetail">—</div>
    <label style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--gray);display:block;margin-bottom:8px">💬 Feedback / Notes</label>
    <textarea id="feedbackText" placeholder="Leave detailed feedback for the intern..."></textarea>
    <div class="modal-btns">
      <button class="modal-btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn-reject" onclick="doAction('rejected')">✗ Reject</button>
      <button class="modal-btn-approve" onclick="doAction('approved')">✓ Approve</button>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div data-component="sidebar-admin"></div>

<div class="main">
  <div class="topbar">
    <div>
      <h1>Manage Submissions</h1>
      <p style="font-size:13px;color:var(--gray);margin-top:1px">Review, approve, and provide feedback on all intern submissions</p>
    </div>
    <span class="admin-tag">⚙️ Admin Mode</span>
  </div>

  <div class="content">
    <div class="toolbar">
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
        <button class="filter-tab" onclick="setFilter('pending',this)">⏳ Pending (5)</button>
        <button class="filter-tab" onclick="setFilter('approved',this)">✅ Approved</button>
        <button class="filter-tab" onclick="setFilter('rejected',this)">✗ Rejected</button>
      </div>
      <div class="search-box">
        <span>🔍</span>
        <input type="text" placeholder="Search by intern or task..." oninput="setSearch(this.value)">
      </div>
      <select class="sort-select">
        <option>Newest First</option>
        <option>Oldest First</option>
        <option>Intern A–Z</option>
      </select>
      <div class="results-info" id="resultsInfo">—</div>
    </div>

    <div class="card">
      <table class="big-table">
        <thead>
          <tr>
            <th>Intern</th>
            <th>Task</th>
            <th>Category</th>
            <th>Submitted</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="pagination">
        <div class="page-info" id="pageInfo">—</div>
        <div class="page-btns">
          <button class="page-btn">‹</button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn">›</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let submissions = window.TaskPortal ? TaskPortal.getTasks() : [];

let currentFilter = 'all', currentSearch = '', activeId = null;

function render() {
  let filtered = submissions.filter(s => {
    const matchF = currentFilter === 'all' || s.status === currentFilter;
    const taskName = s.title || s.task || '';
    const matchS = s.intern.toLowerCase().includes(currentSearch.toLowerCase()) || taskName.toLowerCase().includes(currentSearch.toLowerCase());
    return matchF && matchS;
  });
  document.getElementById('resultsInfo').textContent = `${filtered.length} result${filtered.length!==1?'s':''}`;
  document.getElementById('pageInfo').textContent = `Showing 1–${Math.min(filtered.length,10)} of ${filtered.length} submissions`;
  const bm = {pending:'<span class="badge badge-pending">⏳ Pending</span>',approved:'<span class="badge badge-approved">✅ Approved</span>',rejected:'<span class="badge badge-rejected">✗ Rejected</span>'};
  document.getElementById('tableBody').innerHTML = filtered.map(s => `
    <tr>
      <td><div class="intern-cell"><div class="intern-av" style="background:${s.color}">${s.initials}</div><div><div class="intern-name">${s.intern}</div><div class="intern-email">${s.email}</div></div></div></td>
      <td><div class="task-name-cell">${s.title || s.task}</div><div class="task-cat">📁 ${s.cat}</div></td>
      <td style="font-size:12px;color:var(--gray)">${s.cat}</td>
      <td style="font-size:12px;color:var(--gray)">${s.date}</td>
      <td>${bm[s.status]}</td>
      <td><div class="action-btns">
        <button class="action-btn btn-view" onclick="openModal(${s.id})">👁 Review</button>
        ${s.status==='pending'?`<button class="action-btn btn-approve" onclick="quickAction(${s.id},'approved')">✓</button><button class="action-btn btn-reject" onclick="quickAction(${s.id},'rejected')">✗</button>`:''}
        <button class="action-btn btn-delete" onclick="deleteRow(${s.id})">🗑</button>
      </div></td>
    </tr>
  `).join('') || `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--gray);font-size:14px">No submissions found.</td></tr>`;
}
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setSearch(v) { currentSearch = v; render(); }
function openModal(id) {
  activeId = id;
  const s = submissions.find(x => x.id === id);
  document.getElementById('modalTitle').textContent = `📋 Review: ${s.title || s.task}`;
  document.getElementById('modalSub').textContent = `Submitted by ${s.intern} · ${s.date}`;
  document.getElementById('modalDetail').innerHTML = `<strong>Description:</strong> ${s.desc}`;
  document.getElementById('feedbackText').value = '';
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); activeId = null; }
function doAction(action) {
  const feedback = document.getElementById('feedbackText').value;
  if (!feedback.trim()) { document.getElementById('feedbackText').style.borderColor = 'var(--red)'; return; }
  
  if (window.TaskPortal) {
    TaskPortal.updateTask(activeId, { status: action, feedback: feedback });
    submissions = TaskPortal.getTasks(); // Refresh local list
  }
  
  const s = submissions.find(x => x.id === activeId);
  closeModal();
  showToast(action === 'approved' ? `✅ "${s.title || s.task}" approved with feedback!` : `✗ "${s.title || s.task}" rejected with feedback.`, action === 'approved' ? 'success' : 'error');
  render();
}
function quickAction(id, action) {
  if (window.TaskPortal) {
    TaskPortal.updateTask(id, { status: action });
    submissions = TaskPortal.getTasks(); // Refresh local list
  }
  showToast(action === 'approved' ? `✅ Approved!` : `✗ Rejected.`, action === 'approved' ? 'success' : 'error');
  render();
}
function deleteRow(id) {
  if (confirm('Are you sure you want to delete this submission?')) {
    if (window.TaskPortal) {
      TaskPortal.deleteTask(id);
      submissions = TaskPortal.getTasks(); // Refresh local list
    }
    showToast('🗑 Submission deleted.', 'error');
    render();
  }
}
function showToast(msg, type='success') {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '⚠️';
  toast.className = `toast ${type} show`;
  setTimeout(() => { toast.classList.remove('show'); }, 3500);
}
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
render();
</script>
<script src="js/tasks.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
</body>
</html>
