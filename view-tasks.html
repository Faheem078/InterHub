<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tasks – InternHub</title>
<link rel="stylesheet" href="css/components.css">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--red:#DC2626;--red-dark:#991B1B;--red-light:#FEE2E2;--blue:#1D4ED8;--blue-dark:#1E3A8A;--blue-light:#DBEAFE;--white:#fff;--dark:#0F172A;--gray:#64748B;--border:#E2E8F0;--off-white:#F8FAFC;--sidebar:220px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--dark);min-height:100vh;display:flex}
  h1,h2,h3,h4{font-family:'Syne',sans-serif}
  .sidebar{width:var(--sidebar);background:var(--dark);min-height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:50}
  .sidebar-logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo-icon{width:34px;height:34px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:white;font-size:16px;flex-shrink:0}
  .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:white}
  .logo-text span{color:#FCA5A5}
  .sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px}
  .nav-section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.3);padding:12px 8px 6px;font-weight:700}
  .nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;color:rgba(255,255,255,.6);font-size:14px;font-weight:500;transition:all .2s}
  .nav-item:hover{background:rgba(255,255,255,.08);color:white}
  .nav-item.active{background:var(--red);color:white}
  .nav-icon{font-size:17px;width:20px;text-align:center;flex-shrink:0}
  .nav-badge{margin-left:auto;background:var(--red);color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px}
  .nav-item.active .nav-badge{background:rgba(255,255,255,.3)}
  .sidebar-bottom{padding:16px 12px;border-top:1px solid rgba(255,255,255,.08)}
  .user-profile{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer}
  .user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--blue));display:flex;align-items:center;justify-content:center;font-weight:700;color:white;font-size:13px;flex-shrink:0}
  .user-name{font-size:13px;font-weight:600;color:white}
  .user-role{font-size:11px;color:rgba(255,255,255,.4)}
  .main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column}
  .topbar{background:white;border-bottom:2px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
  .topbar h1{font-size:20px;font-weight:800}
  .btn-new{padding:9px 20px;background:var(--red);color:white;border:none;border-radius:9px;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s;text-decoration:none;display:flex;align-items:center;gap:6px}
  .btn-new:hover{background:var(--red-dark)}
  .content{padding:32px}
  .filters-bar{background:white;border-radius:14px;border:2px solid var(--border);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .filter-group{display:flex;align-items:center;gap:8px}
  .filter-label{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
  .filter-tabs{display:flex;gap:6px}
  .filter-tab{padding:6px 14px;border-radius:8px;border:2px solid var(--border);background:var(--off-white);font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
  .filter-tab:hover{border-color:var(--blue);color:var(--blue)}
  .filter-tab.active{background:var(--red);color:white;border-color:var(--red)}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--off-white);border:2px solid var(--border);border-radius:10px;padding:8px 14px;flex:1;max-width:280px}
  .search-box input{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;width:100%;color:var(--dark)}
  .search-box input::placeholder{color:#CBD5E1}
  .sort-select{padding:8px 14px;border:2px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--gray);background:var(--off-white);outline:none;cursor:pointer}
  .tasks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
  .task-card{background:white;border-radius:16px;border:2px solid var(--border);transition:all .3s;overflow:hidden}
  .task-card:hover{border-color:transparent;box-shadow:0 12px 40px rgba(0,0,0,.09);transform:translateY(-3px)}
  .task-card-top{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .task-info { flex: 1; }
  .task-title{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:4px;line-height:1.3}
  .task-cat{font-size:12px;color:var(--gray)}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:700;white-space:nowrap}
  .badge-pending{background:#FEF3C7;color:#92400E}
  .badge-approved{background:#D1FAE5;color:#065F46}
  .badge-rejected{background:var(--red-light);color:var(--red-dark)}
  .task-card-body{padding:16px 20px}
  .task-desc{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-clamp:2;}
  .task-meta-row{display:flex;justify-content:space-between;align-items:center}
  .task-date{font-size:12px;color:var(--gray);display:flex;align-items:center;gap:4px}
  .task-actions{display:flex;gap:8px}
  .task-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;border:none}
  .btn-view{background:var(--blue-light);color:var(--blue)}
  .btn-view:hover{background:var(--blue);color:white}
  .btn-edit{background:var(--off-white);color:var(--dark);border:1px solid var(--border)}
  .btn-edit:hover{border-color:var(--gray);background:white}
  .btn-delete{background:var(--red-light);color:var(--red-dark)}
  .btn-delete:hover{background:var(--red);color:white}
  .task-feedback{margin-top:14px;padding:12px 14px;background:var(--off-white);border-radius:10px;border-left:3px solid var(--blue)}
  .task-feedback-label{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--blue);margin-bottom:4px}
  .task-feedback-text{font-size:13px;color:var(--dark)}
  .task-feedback.red-feedback{border-left-color:var(--red)}
  .task-feedback.red-feedback .task-feedback-label{color:var(--red)}
  .empty-state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--gray)}
  .empty-state-icon{font-size:64px;margin-bottom:16px;opacity:.5}
  .empty-state h3{font-size:20px;margin-bottom:8px;color:var(--dark)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .modal-overlay.show{display:flex}
  .modal{background:white;border-radius:20px;padding:32px;max-width:540px;width:90%;position:relative;max-height:80vh;overflow-y:auto}
  .modal h3{font-size:20px;font-weight:800;margin-bottom:8px}
  .modal-close{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:white;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
  .modal-close:hover{background:var(--red-light);border-color:var(--red)}
  .modal-field{margin-bottom:14px}
  .modal-field-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gray);margin-bottom:4px}
  .modal-field-value{font-size:14px;color:var(--dark);line-height:1.6}
  @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
</style>
</head>
<body>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modalTitle">—</h3>
    <div style="margin-bottom:20px" id="modalBadge"></div>
    <div class="modal-field"><div class="modal-field-label">Category</div><div class="modal-field-value" id="modalCat">—</div></div>
    <div class="modal-field"><div class="modal-field-label">Submitted</div><div class="modal-field-value" id="modalDate">—</div></div>
    <div class="modal-field"><div class="modal-field-label">Description</div><div class="modal-field-value" id="modalDesc">—</div></div>
    <div class="modal-field" id="modalFeedbackWrap">
      <div class="modal-field-label">Admin Feedback</div>
      <div class="modal-field-value" id="modalFeedback">—</div>
    </div>
    <div style="margin-top:20px;display:flex;justify-content:flex-end;gap:10px">
      <button class="task-btn btn-edit" onclick="closeModal()">Close</button>
      <a href="submit-task.html" class="task-btn btn-view" style="text-decoration:none">Submit Similar</a>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div data-component="sidebar-intern"></div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div>
      <h1>My Submissions</h1>
      <p style="font-size:13px;color:var(--gray);margin-top:1px">Track all your task submissions</p>
    </div>
    <a href="submit-task.html" class="btn-new">➕ New Submission</a>
  </div>

  <div class="content">
    <div class="filters-bar">
      <div class="filter-group">
        <span class="filter-label">Status</span>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterTasks('all',this)">All (6)</button>
          <button class="filter-tab" onclick="filterTasks('pending',this)">⏳ Pending (2)</button>
          <button class="filter-tab" onclick="filterTasks('approved',this)">✅ Approved (3)</button>
          <button class="filter-tab" onclick="filterTasks('rejected',this)">✗ Revision (1)</button>
        </div>
      </div>
      <div class="search-box">
        <span>🔍</span>
        <input type="text" placeholder="Search tasks..." oninput="searchTasks(this.value)">
      </div>
      <select class="sort-select" onchange="sortTasks(this.value)">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="name">A–Z</option>
      </select>
    </div>

    <div class="tasks-grid" id="tasksGrid"></div>
  </div>
</div>

<script>
const tasks = window.TaskPortal ? TaskPortal.getTasks() : [];

let currentFilter = 'all';
let currentSearch = '';

function renderTasks() {
  const grid = document.getElementById('tasksGrid');
  let filtered = tasks.filter(t => {
    const matchFilter = currentFilter === 'all' || t.status === currentFilter;
    const matchSearch = t.title.toLowerCase().includes(currentSearch.toLowerCase()) || t.cat.toLowerCase().includes(currentSearch.toLowerCase());
    return matchFilter && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><h3>No tasks found</h3><p>Try changing your filter or search term.</p></div>`;
    return;
  }

  const badgeMap = { pending:'<span class="badge badge-pending">⏳ Pending Review</span>', approved:'<span class="badge badge-approved">✅ Approved</span>', rejected:'<span class="badge badge-rejected">✗ Needs Revision</span>' };
  grid.innerHTML = filtered.map(t => `
    <div class="task-card" data-status="${t.status}">
      <div class="task-card-top">
        <div class="task-info">
          <div class="task-title">${t.title}</div>
          <div class="task-cat">📁 ${t.cat}</div>
        </div>
        ${badgeMap[t.status]}
      </div>
      <div class="task-card-body">
        <div class="task-desc">${t.desc}</div>
        ${t.feedback ? `<div class="task-feedback ${t.status==='rejected'?'red-feedback':''}"><div class="task-feedback-label">💬 Admin Feedback</div><div class="task-feedback-text">${t.feedback}</div></div>` : ''}
        <div class="task-meta-row" style="margin-top:${t.feedback?'14px':'0'}">
          <div class="task-date">📅 ${t.date}</div>
          <div class="task-actions">
            <button class="task-btn btn-view" onclick="openModal(${t.id})">👁 View</button>
            <button class="task-btn btn-edit">✏️</button>
            <button class="task-btn btn-delete">🗑</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function filterTasks(status, el) {
  currentFilter = status;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}
function searchTasks(val) { currentSearch = val; renderTasks(); }
function openModal(id) {
  const t = tasks.find(x => x.id === id);
  document.getElementById('modalTitle').textContent = t.title;
  const bm = { pending:'<span class="badge badge-pending">⏳ Pending Review</span>', approved:'<span class="badge badge-approved">✅ Approved</span>', rejected:'<span class="badge badge-rejected">✗ Needs Revision</span>' };
  document.getElementById('modalBadge').innerHTML = bm[t.status];
  document.getElementById('modalCat').textContent = t.cat;
  document.getElementById('modalDate').textContent = t.date;
  document.getElementById('modalDesc').textContent = t.desc;
  const fw = document.getElementById('modalFeedbackWrap');
  if (t.feedback) { fw.style.display = 'block'; document.getElementById('modalFeedback').textContent = t.feedback; }
  else { fw.style.display = 'none'; }
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
renderTasks();
</script>
<script src="js/tasks.js"></script>
<script src="js/components.js"></script>
<script src="js/main.js"></script>
</body>
</html>
